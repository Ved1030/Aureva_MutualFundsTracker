<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aureva Fund Tracker - Track Indian Mutual Funds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              fintech: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#4f46e5',
                600: '#4338ca',
                700: '#3730a3',
                800: '#312e81',
                900: '#1e1b4b',
              },
              accent: {
                50: '#ecfeff',
                100: '#cffafe',
                200: '#a5f3fc',
                300: '#67e8f9',
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
                700: '#0e7490',
              },
            },
          },
        },
      }
    </script>
    <style>
      body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(226, 232, 240, 0.6);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.5);
      }
      .hero-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      }
      .hero-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        pointer-events: none;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .marquee-track {
        animation: marquee 40s linear infinite;
      }
      .marquee-track:hover {
        animation-play-state: paused;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }
      .card-hover {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      }
      .stat-card {
        transition: all 0.3s ease;
      }
      .stat-card:hover {
        transform: translateY(-2px);
      }
      .fund-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .fund-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 32px -8px rgba(79, 70, 229, 0.12);
        border-color: rgba(79, 70, 229, 0.3);
      }
      .search-input {
        transition: all 0.3s ease;
      }
      .search-input:focus {
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15), 0 8px 24px -4px rgba(79, 70, 229, 0.1);
      }
      .btn-primary {
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px -4px rgba(79, 70, 229, 0.3);
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .range-btn {
        transition: all 0.2s ease;
      }
      .range-btn:hover:not(.range-btn-active) {
        background: #f1f5f9;
      }
      .range-btn-active {
        background: #4f46e5 !important;
        color: white !important;
        box-shadow: 0 4px 12px -2px rgba(79, 70, 229, 0.3);
      }
      @keyframes tickerPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .ticker-dot {
        animation: tickerPulse 2s ease-in-out infinite;
      }
      .grouped-variant-enter {
        animation: fadeInUp 0.2s ease-out forwards;
      }
      .shimmer {
        background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
